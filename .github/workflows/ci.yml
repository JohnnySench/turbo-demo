name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install

      - run: pnpm exec playwright install --with-deps

      # -----------------------
      # BUILD AFFECTED
      # -----------------------
      - name: Build affected apps
        run: pnpm turbo run build --filter=...[origin/main]

      # -----------------------
      # START ONLY AFFECTED PREVIEW
      # -----------------------
      - name: Start base
        run: pnpm --filter base preview --port 4173 &

      - name: Start admin
        run: pnpm --filter admin preview --port 4174 &

      - name: Start promotion
        run: pnpm --filter promotion preview --port 4175 &

      # -----------------------
      # E2E AFFECTED (Turbo decides)
      # -----------------------
      - name: E2E affected
        run: pnpm turbo run test:e2e --filter=...[origin/main]
