name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # -----------------------
      # Playwright browsers
      # -----------------------
      - name: Install Playwright
        run: pnpm exec playwright install --with-deps

      # -----------------------
      # Build affected
      # -----------------------
      - name: Build affected
        run: pnpm turbo run build --filter=...[origin/main]

      # -----------------------
      # Resolve affected apps
      # -----------------------
      - name: Get affected apps
        id: affected
        run: |
          APPS=$(pnpm turbo run build \
            --filter=...[origin/main] \
            --dry-run=json \
            | jq -r '.tasks[].package' \
            | sort -u)

          echo "Affected apps:"
          echo "$APPS"

          {
            echo 'apps<<EOF'
            echo "$APPS"
            echo EOF
          } >> "$GITHUB_OUTPUT"

      # -----------------------
      # Start previews
      # -----------------------
      - name: Start previews
        run: |
          APPS="${{ steps.affected.outputs.apps }}"

          if echo "$APPS" | grep -qx "base"; then
            pnpm --filter base preview --port 4173 &
          fi

          if echo "$APPS" | grep -qx "admin"; then
            pnpm --filter admin preview --port 4174 &
          fi

          if echo "$APPS" | grep -qx "promotion"; then
            pnpm --filter promotion preview --port 4175 &
          fi

      # -----------------------
      # Wait for apps
      # -----------------------
      - name: Wait for previews
        run: |
          APPS="${{ steps.affected.outputs.apps }}"

          if echo "$APPS" | grep -qx "base"; then
            npx wait-on http://127.0.0.1:4173
          fi

          if echo "$APPS" | grep -qx "admin"; then
            npx wait-on http://127.0.0.1:4174
          fi

          if echo "$APPS" | grep -qx "promotion"; then
            npx wait-on http://127.0.0.1:4175
          fi

      # -----------------------
      # E2E only affected
      # -----------------------
      - name: E2E affected
        run: pnpm turbo run test:e2e --filter=...[origin/main]
