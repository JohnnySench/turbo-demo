name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      # -----------------------
      # PR: AFFECTED PIPELINE
      # -----------------------

      - name: Unit tests (affected)
        if: github.event_name == 'pull_request'
        run: pnpm turbo run test --filter=...[origin/main]

      - name: Build (affected)
        if: github.event_name == 'pull_request'
        run: pnpm turbo run build --filter=...[origin/main]

      - name: Start apps (preview)
        if: github.event_name == 'pull_request'
        run: |
          pnpm --filter base preview --port 4173 --strictPort &
          pnpm --filter admin preview --port 4174 --strictPort &
          pnpm --filter promotion preview --port 4175 --strictPort &

      - name: Wait for apps
        if: github.event_name == 'pull_request'
        run: pnpm exec wait-on http://localhost:4173 http://localhost:4174 http://localhost:4175

      - name: E2E tests (affected)
        if: github.event_name == 'pull_request'
        run: pnpm turbo run test:e2e --filter=...[origin/main]

      # -----------------------
      # MAIN: FULL PIPELINE
      # -----------------------

      - name: Unit tests (full)
        if: github.event_name == 'push'
        run: pnpm turbo run test

      - name: Build (full)
        if: github.event_name == 'push'
        run: pnpm turbo run build

      - name: Start apps (full preview)
        if: github.event_name == 'push'
        run: |
          pnpm --filter base preview --port 4173 --strictPort &
          pnpm --filter admin preview --port 4174 --strictPort &
          pnpm --filter promotion preview --port 4175 --strictPort &

      - name: Wait for apps (full)
        if: github.event_name == 'push'
        run: pnpm exec wait-on http://localhost:4173 http://localhost:4174 http://localhost:4175

      - name: E2E tests (full)
        if: github.event_name == 'push'
        run: pnpm turbo run test:e2e
